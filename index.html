<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS ร้านอลูมิเนียม-กระจก-สแตนเลส</title>
<style>
:root{
  --primary:#1d4ed8; --primary-dark:#1e3a8a; --bg:#f1f5f9; --card:#ffffff;
  --border:#e2e8f0; --text:#0f172a; --muted:#64748b; --green:#16a34a;
  --red:#dc2626; --amber:#d97706;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

/* ── Login ── */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 100%);}
.login-card{background:#fff;border-radius:16px;padding:36px 32px;width:360px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-logo{font-size:48px;text-align:center;margin-bottom:8px;}
.login-title{text-align:center;font-size:18px;font-weight:800;color:var(--primary-dark);margin-bottom:24px;}
.login-subtitle{text-align:center;font-size:12.5px;color:var(--muted);margin-top:-18px;margin-bottom:20px;}
.login-err{color:var(--red);font-size:13px;text-align:center;min-height:18px;margin-bottom:8px;}
.login-btn{width:100%;padding:12px;font-size:15px;margin-top:6px;}
.login-version{text-align:center;font-size:11px;color:#94a3b8;margin-top:16px;}

/* ── App shell ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
header{background:var(--primary-dark);color:#fff;padding:7px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
header h1{font-size:14px;white-space:nowrap;}
.nav-wrap{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
nav{display:flex;gap:3px;flex-wrap:wrap;}
nav button{background:transparent;border:none;color:#cbd5e1;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12.5px;font-family:inherit;}
nav button.active{background:var(--primary);color:#fff;font-weight:700;}
.user-badge{font-size:11px;color:#93c5fd;white-space:nowrap;}
.logout-btn{background:rgba(255,255,255,.12);border:none;color:#e2e8f0;padding:5px 9px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;}
.logout-btn:hover{background:rgba(255,255,255,.22);}
.status-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px;}
.status-dot.offline{background:#f87171;}
main{flex:1;overflow:auto;padding:12px;}

/* ── Cards / Forms ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
.card h3{margin-bottom:12px;color:var(--primary-dark);}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;width:100%;font-family:inherit;font-size:14px;background:#fff;}
input:focus,select:focus{outline:2px solid var(--primary);border-color:transparent;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:3px;font-weight:600;}
.row{display:flex;gap:10px;flex-wrap:wrap;}
.col{flex:1;min-width:170px;}

/* ── Buttons ── */
.btn{background:var(--primary);color:#fff;border:none;padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-family:inherit;font-size:14px;transition:.15s;}
.btn:hover{opacity:.88;} .btn:disabled{background:#94a3b8;cursor:not-allowed;}
.btn.green{background:var(--green);} .btn.red{background:var(--red);}
.btn.gray{background:#64748b;} .btn.amber{background:var(--amber);}
.btn.sm{padding:5px 8px;font-size:12.5px;}
.flex-end{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}

/* ── Table ── */
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th,td{padding:8px;border-bottom:1px solid var(--border);text-align:left;vertical-align:middle;}
th{background:#f8fafc;font-weight:600;color:#334155;white-space:nowrap;position:sticky;top:0;z-index:1;}
tr:hover td{background:#f8fafc;}
.text-right{text-align:right;} .text-center{text-align:center;}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge.alu{background:#dbeafe;color:#1e40af;} .badge.glass{background:#e0f2fe;color:#0369a1;}
.badge.door{background:#ede9fe;color:#5b21b6;} .badge.pipe{background:#fae8ff;color:#86198f;}
.badge.fence{background:#fce7f3;color:#9d174d;} .badge.fitting{background:#fef3c7;color:#92400e;}
.badge.curtain{background:#dcfce7;color:#166534;} .badge.other{background:#e2e8f0;color:#334155;}
.badge.teal{background:#ccfbf1;color:#115e59;} .badge.orange{background:#ffedd5;color:#9a3412;}
.badge.slate{background:#e2e8f0;color:#334155;}

/* ── POS Layout (50/50) ── */
.pos-layout{display:flex;gap:12px;height:calc(100vh - 52px);overflow:hidden;}
.pos-left{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
.pos-right{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;overflow:hidden;}
.search-row{display:flex;gap:8px;padding-bottom:10px;flex-shrink:0;}
.search-row input{flex:2;} .search-row select{flex:0 0 160px;}
.prod-table-wrap{flex:1;overflow:auto;border:1px solid var(--border);border-radius:8px;background:#fff;}
.prod-table-wrap tr.prow:hover td{background:#eff6ff;cursor:pointer;}
.add-hint{color:var(--primary);font-weight:700;font-size:16px;}

/* ── Cart ── */
.cart-header{font-weight:700;font-size:14px;margin-bottom:6px;flex-shrink:0;color:var(--primary-dark);}
.cart-body{flex:1;overflow-y:auto;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px 0;min-height:40px;}
.cart-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px dashed var(--border);}
.cart-row:last-child{border-bottom:none;}
.ci-name{flex:1;font-size:13px;line-height:1.3;}
.ci-name small{display:block;color:var(--muted);font-size:11px;}
.ci-qty{width:58px;padding:4px;text-align:center;}
.ci-total{width:72px;text-align:right;font-weight:700;font-size:13px;}
.ci-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:0 3px;}
.totals{font-size:13.5px;padding:5px 0 2px;flex-shrink:0;}
.totals .line{display:flex;justify-content:space-between;padding:2px 0;}
.totals .grand{font-size:18px;font-weight:800;color:var(--primary-dark);border-top:2px solid var(--border);margin-top:5px;padding-top:6px;}
.disc-row{display:flex;gap:6px;align-items:center;margin:5px 0;flex-shrink:0;}
.disc-row>label{white-space:nowrap;font-size:12px;font-weight:600;color:var(--muted);flex:none;}
.disc-row .disc-spacer{flex:1;}
.disc-row input{width:100px;max-width:100px;text-align:right;flex:none;}
.disc-row select{flex:0 0 56px;}
.pay-method{display:flex;gap:6px;margin:5px 0;flex-shrink:0;}
.pay-method button{flex:1;padding:7px;border:2px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-weight:600;font-family:inherit;font-size:12.5px;color:var(--muted);}
.pay-method button.active{border-color:var(--primary);background:#eff6ff;color:var(--primary);}
.paid-row{display:flex;gap:6px;align-items:center;flex-shrink:0;margin-bottom:5px;}
.paid-row label{white-space:nowrap;font-size:12px;font-weight:600;color:var(--muted);flex:none;}
.paid-row .paid-spacer{flex:1;}
.paid-row input{width:130px;max-width:130px;text-align:right;flex:none;font-size:15px;font-weight:700;}
.checkout-row{display:flex;gap:6px;flex-shrink:0;}
.credit-info{font-size:12px;background:#fef9c3;border:1px solid #fde68a;border-radius:6px;padding:5px 8px;margin-bottom:5px;color:#854d0e;flex-shrink:0;}
.debt-result{font-size:12px;border-radius:6px;padding:5px 8px;margin-bottom:5px;flex-shrink:0;}
.debt-result.add{background:#fee2e2;border:1px solid #fecaca;color:#991b1b;}
.debt-result.clear{background:#dcfce7;border:1px solid #bbf7d0;color:#166534;}
.debt-result.credit{background:#dbeafe;border:1px solid #bfdbfe;color:#1e40af;}

/* Mobile portrait */
@media (orientation:portrait),(max-width:680px){
  .pos-layout{flex-direction:column;height:auto;overflow-y:auto;min-height:calc(100vh - 52px);}
  .pos-left{height:48vh;min-height:260px;flex:none;}
  .pos-right{flex:none;min-height:52vh;max-width:100%;}
  main{padding:8px;}
}

/* ── Stats / misc ── */
.stat-cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.stat{flex:1;min-width:145px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;}
.stat .num{font-size:20px;font-weight:800;color:var(--primary-dark);}
.stat .lbl{font-size:12px;color:var(--muted);margin-top:2px;}
.empty-state{text-align:center;color:var(--muted);padding:24px 0;}
.low-stock{color:var(--red);font-weight:700;}
.debt-val{color:var(--red);font-weight:700;}
.small{font-size:12px;color:var(--muted);}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13.5px;}
.alert.error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;}
.alert.success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0;}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;z-index:200;font-size:18px;font-weight:700;color:var(--primary);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:12px;padding:20px;max-width:520px;width:95%;max-height:90vh;overflow-y:auto;}
.modal h3{margin-bottom:14px;color:var(--primary-dark);}
.modal-lg{max-width:780px;}
.receipt{font-family:'Courier New',Courier,monospace;font-size:12.5px;width:300px;margin:0 auto;color:#111;}
.receipt hr{border:none;border-top:1px dashed #888;margin:6px 0;}
.rline{display:flex;justify-content:space-between;} .rcenter{text-align:center;}
.tab-pills{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.tab-pill{padding:6px 14px;border:2px solid var(--border);border-radius:20px;cursor:pointer;font-size:13px;background:#fff;font-family:inherit;font-weight:600;color:var(--muted);}
.tab-pill.active{border-color:var(--primary);background:var(--primary);color:#fff;}
.import-preview{overflow:auto;max-height:260px;border:1px solid var(--border);border-radius:8px;margin-top:10px;}
.import-preview table{font-size:12px;}
.import-preview th{font-size:11px;}
.section-divider{border:none;border-top:2px solid var(--border);margin:18px 0;}
@media print{body>*:not(#printArea){display:none!important;}#printArea{display:block!important;}}
::-webkit-scrollbar{width:7px;height:7px;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-bg">
  <div class="login-card">
    <div class="login-logo">🪟</div>
    <h2 class="login-title">POS ระบบจัดการร้านค้า</h2>
    <p class="login-subtitle">อลูมิเนียม · กระจก · สแตนเลส</p>
    <div class="field"><label>ชื่อผู้ใช้</label>
      <input id="loginUser" type="text" autocomplete="username" placeholder="Username">
    </div>
    <div class="field"><label>รหัสผ่าน</label>
      <input id="loginPass" type="password" autocomplete="current-password" placeholder="Password">
    </div>
    <div id="loginErr" class="login-err"></div>
    <button class="btn green login-btn" id="loginBtn">🔐 เข้าสู่ระบบ</button>
    <div class="login-version" id="loginShopName"></div>
  </div>
</div>

<div id="loadingOverlay" class="loading-overlay" style="display:none">⏳ กำลังโหลด...</div>

<div class="app" style="display:none;" id="appRoot">
  <header>
    <h1>🪟 <span id="shopNameHeader">POS</span></h1>
    <nav id="mainNav">
      <button data-tab="pos" class="active">หน้าขาย</button>
      <button data-tab="products">สินค้า/สต็อก</button>
      <button data-tab="customers">ลูกค้า/หนี้</button>
      <button data-tab="sales">ประวัติ</button>
      <button data-tab="report">รายงาน</button>
      <button data-tab="settings">ตั้งค่า</button>
    </nav>
    <div class="nav-wrap">
      <a href="documents.html" class="logout-btn" style="text-decoration:none;background:rgba(255,255,255,.15);">📄 เอกสาร</a>
      <span class="user-badge" id="userBadge"></span>
      <button class="logout-btn" id="logoutBtn">ออกระบบ</button>
      <span class="status-dot" id="dbDot"></span>
    </div>
  </header>
  <main id="mainArea"></main>
</div>
<div id="printArea" style="display:none;"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ═══════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════
const BADGE_COLORS=[
  {v:'alu',l:'น้ำเงิน'},{v:'glass',l:'ฟ้า'},{v:'door',l:'ม่วง'},
  {v:'pipe',l:'ม่วงชมพู'},{v:'fence',l:'ชมพู'},{v:'fitting',l:'เหลือง'},
  {v:'curtain',l:'เขียว'},{v:'teal',l:'เขียวน้ำทะเล'},{v:'orange',l:'ส้ม'},{v:'slate',l:'เทา'},
];
const SESSION_KEY='pos_sess_v1';
const SESSION_HRS=12;

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let session=null, categories=[], products=[], customers=[], sales=[];
let settings={shop_name:'',address:'',phone:'',tax_id:'',low_stock_threshold:5};
let cart=[], selCustomer=null, currentTab='pos';
let searchTerm='', catFilter='all';
let discAmt=0, discType='amount', paidStr='', payMethod='cash';
let vatMode='none', vatRate=7;
let settingsSub='shop'; // sub-tab in settings

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
const money=n=>(Number(n)||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const el=h=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;};
const now8=id=>String(id).slice(-8).toUpperCase();
const catInfo=id=>categories.find(c=>c.id===id)||{id:'other',label:'อื่นๆ',color:'other'};
function fmtDateTH(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');const M=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];return d.getDate()+' '+M[d.getMonth()]+' '+(d.getFullYear()+543);}
function dateLabel(iso){const d=new Date(iso);return d.toLocaleDateString('th-TH',{year:'numeric',month:'2-digit',day:'2-digit'})+' '+d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});}
function setDBStatus(ok){document.getElementById('dbDot').className='status-dot'+(ok?'':' offline');}
function showSpinner(){document.getElementById('loadingOverlay').style.display='flex';}
function hideSpinner(){document.getElementById('loadingOverlay').style.display='none';}
function showToast(msg,type='success'){
  const t=el(`<div class="alert ${type}" style="position:fixed;top:60px;right:16px;z-index:300;max-width:340px;box-shadow:0 4px 12px rgba(0,0,0,.15);">${esc(msg)}</div>`);
  document.body.appendChild(t); setTimeout(()=>t.remove(),3500);
}

// SHA-256
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ═══════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════
function getSession(){
  try{
    const s=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
    if(!s) return null;
    if(Date.now()-s.loginTime>SESSION_HRS*3600000){localStorage.removeItem(SESSION_KEY);return null;}
    return s;
  }catch{return null;}
}
function saveSession(u){
  localStorage.setItem(SESSION_KEY,JSON.stringify({
    userId:u.id,username:u.username,role:u.role,display_name:u.display_name||u.username,loginTime:Date.now()
  }));
}
function clearSession(){localStorage.removeItem(SESSION_KEY);}

async function doLogin(){
  const uname=document.getElementById('loginUser').value.trim();
  const pass=document.getElementById('loginPass').value;
  const errEl=document.getElementById('loginErr');
  errEl.textContent='';
  if(!uname||!pass){errEl.textContent='กรุณากรอกชื่อผู้ใช้และรหัสผ่าน';return;}
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('loginBtn').textContent='⏳ กำลังเข้าสู่ระบบ...';
  try{
    const hash=await sha256(pass);
    const {data,error}=await sb.from('pos_users').select('*')
      .eq('username',uname).eq('password_hash',hash).eq('is_active',true).single();
    if(error||!data){
      errEl.textContent='ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
      document.getElementById('loginBtn').disabled=false;
      document.getElementById('loginBtn').textContent='🔐 เข้าสู่ระบบ';
      return;
    }
    saveSession(data); session=getSession();
    showSpinner();
    await loadAll();
    hideSpinner();
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appRoot').style.display='flex';
    render();
  }catch(e){
    errEl.textContent='เชื่อมต่อเซิร์ฟเวอร์ไม่ได้: '+e.message;
    document.getElementById('loginBtn').disabled=false;
    document.getElementById('loginBtn').textContent='🔐 เข้าสู่ระบบ';
    hideSpinner();
  }
}
function doLogout(){
  if(!confirm('ออกจากระบบ?')) return;
  clearSession(); session=null; cart=[];
  document.getElementById('appRoot').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginPass').value='';
  document.getElementById('loginErr').textContent='';
  document.getElementById('loginBtn').disabled=false;
  document.getElementById('loginBtn').textContent='🔐 เข้าสู่ระบบ';
}

// ═══════════════════════════════════════════
//  LOAD DATA
// ═══════════════════════════════════════════
async function loadAll(){
  try{
    const [rCat,rProd,rCust,rSale,rSet]=await Promise.all([
      sb.from('categories').select('*').order('sort_order'),
      sb.from('products').select('*').order('name'),
      sb.from('customers').select('*').order('name'),
      sb.from('sales').select('*,sale_items(*)').order('sale_date',{ascending:false}).limit(200),
      sb.from('settings').select('*').single(),
    ]);
    if(rProd.error) throw rProd.error;
    categories=rCat.data||[]; products=rProd.data||[]; customers=rCust.data||[];
    sales=(rSale.data||[]).map(s=>({...s,items:s.sale_items||[]}));
    if(rSet.data) settings=rSet.data;
    if(!categories.length) categories=[{id:'other',label:'อื่นๆ',color:'other',sort_order:99}];
    if(!selCustomer&&customers.length) selCustomer=customers[0].id;
    setDBStatus(true);
  }catch(e){setDBStatus(false);console.error(e);showToast('โหลดข้อมูลไม่สำเร็จ: '+e.message,'error');}
}

// ═══════════════════════════════════════════
//  RENDER ROUTER
// ═══════════════════════════════════════════
function render(){
  document.getElementById('shopNameHeader').textContent=settings.shop_name||'POS';
  document.getElementById('userBadge').textContent=session?`👤 ${session.display_name||session.username}`:'';
  document.querySelectorAll('#mainNav button').forEach(b=>{
    b.classList.toggle('active',b.dataset.tab===currentTab);
    b.onclick=()=>{currentTab=b.dataset.tab;searchTerm='';catFilter='all';render();};
  });
  document.getElementById('logoutBtn').onclick=doLogout;
  const m=document.getElementById('mainArea');
  ({pos:renderPOS,products:renderProducts,customers:renderCustomers,
    sales:renderSales,report:renderReport,settings:renderSettings}[currentTab])(m);
}

// ═══════════════════════════════════════════
//  POS
// ═══════════════════════════════════════════
function filteredProds(){
  return products.filter(p=>{
    if(catFilter!=='all'&&p.category!==catFilter) return false;
    if(searchTerm){const t=searchTerm.toLowerCase();return p.name.toLowerCase().includes(t)||(p.sku||'').toLowerCase().includes(t);}
    return true;
  });
}
function cleanNum(v){v=v.replace(/[^0-9.]/g,'');const p=v.split('.');return p.length>2?p[0]+'.'+p.slice(1).join(''):v;}

function renderPOS(m){
  const prods=filteredProds();
  m.innerHTML=`
  <div class="pos-layout">
    <div class="pos-left">
      <div class="search-row">
        <input id="srchInp" placeholder="🔍 ค้นหาสินค้า / SKU..." value="${esc(searchTerm)}">
        <select id="catSel">
          <option value="all">ทุกหมวดหมู่</option>
          ${categories.map(c=>`<option value="${c.id}" ${catFilter===c.id?'selected':''}>${esc(c.label)}</option>`).join('')}
        </select>
      </div>
      <div class="prod-table-wrap">
        <table>
          <thead><tr><th>รหัสสินค้า</th><th>ชื่อสินค้า</th><th>หน่วย</th><th class="text-right">ราคา</th><th class="text-right">สต๊อก</th><th></th></tr></thead>
          <tbody>${prods.length?prods.map(prodRow).join(''):`<tr><td colspan="6" class="empty-state">ไม่พบสินค้า</td></tr>`}</tbody>
        </table>
      </div>
    </div>
    <div class="pos-right">
      <div class="cart-header">🛒 รายการสั่งซื้อ</div>
      <div class="field" style="flex-shrink:0;margin-bottom:6px;">
        <label>ลูกค้า</label>
        <select id="custSel">
          ${customers.map(c=>`<option value="${c.id}" ${selCustomer===c.id?'selected':''}>${esc(c.name)}${c.debt>0?` (หนี้ ฿${money(c.debt)})`:''}</option>`).join('')}
        </select>
      </div>
      <div class="cart-body" id="cartBody">
        ${cart.length?cart.map(cartRow).join(''):`<div class="empty-state">แตะแถวสินค้าทางซ้ายเพื่อเพิ่ม</div>`}
      </div>
      <div class="disc-row">
        <label>ส่วนลด</label>
        <span class="disc-spacer"></span>
        <input id="discInp" type="text" inputmode="decimal" value="${discAmt||''}" placeholder="0">
        <select id="discTypeSel"><option value="amount" ${discType==='amount'?'selected':''}>บาท</option><option value="percent" ${discType==='percent'?'selected':''}> %</option></select>
      </div>
      <div class="disc-row">
        <label>VAT</label>
        <select id="vatModeSel" style="width:190px;flex:none;font-size:13px;margin-left:auto;">
          <option value="none" ${vatMode==='none'?'selected':''}>ไม่มี VAT</option>
          <option value="exclude" ${vatMode==='exclude'?'selected':''}>คิด VAT 7% เพิ่ม</option>
          <option value="include" ${vatMode==='include'?'selected':''}>ราคารวม VAT 7% แล้ว</option>
        </select>
      </div>
      <div class="totals">
        <div class="line"><span>ยอดรวม</span><span id="tSub">฿0.00</span></div>
        <div class="line"><span>ส่วนลด</span><span id="tDisc" style="color:var(--red)">-฿0.00</span></div>
        <div class="line" id="tVatLine" style="display:none;"><span id="tVatLbl">VAT 7%</span><span id="tVat">฿0.00</span></div>
        <div class="line grand"><span>สุทธิ</span><span id="tGrand">฿0.00</span></div>
      </div>
      <div class="pay-method">
        <button data-pm="cash" class="${payMethod==='cash'?'active':''}">💵 เงินสด</button>
        <button data-pm="credit" class="${payMethod==='credit'?'active':''}">📒 บันทึกหนี้</button>
      </div>
      <div id="creditInfo"></div>
      <div class="paid-row">
        <label>รับเงิน (฿)</label>
        <span class="paid-spacer"></span>
        <input id="paidInp" type="text" inputmode="decimal" value="${esc(paidStr)}" placeholder="0">
      </div>
      <div id="debtResult"></div>
      <div class="totals" style="padding:2px 0 6px;">
        <div class="line" style="font-size:15px;font-weight:700;">
          <span id="changeLbl">เงินทอน</span><span id="tChange" style="color:var(--green)">฿0.00</span>
        </div>
        <div id="tWarn" class="small" style="text-align:right;color:var(--red);"></div>
      </div>
      <div class="checkout-row">
        <button class="btn gray" id="clearBtn" style="flex:1;">ล้าง</button>
        <button class="btn green" id="checkoutBtn" style="flex:2;" ${cart.length?'':'disabled'}>✓ ยืนยันการขาย</button>
      </div>
    </div>
  </div>`;

  const si=document.getElementById('srchInp');
  si.oninput=e=>{searchTerm=e.target.value;updateProdTable();};
  document.getElementById('catSel').onchange=e=>{catFilter=e.target.value;renderPOS(m);};
  document.getElementById('custSel').onchange=e=>{selCustomer=e.target.value;updatePosTotals();};
  document.getElementById('discInp').oninput=e=>{e.target.value=cleanNum(e.target.value);discAmt=Number(e.target.value)||0;updatePosTotals();};
  document.getElementById('paidInp').oninput=e=>{e.target.value=cleanNum(e.target.value);paidStr=e.target.value;updatePosTotals();};
  const vmSel=document.getElementById('vatModeSel');if(vmSel)vmSel.onchange=e=>{vatMode=e.target.value;updatePosTotals();};
  m.querySelectorAll('.pay-method button').forEach(b=>b.onclick=()=>{payMethod=b.dataset.pm;renderPOS(m);});
  document.getElementById('clearBtn').onclick=()=>{if(confirm('ล้างตะกร้า?')){cart=[];discAmt=0;paidStr='';payMethod='cash';renderPOS(m);}};
  document.getElementById('checkoutBtn').onclick=confirmSale;
  m.querySelectorAll('tr.prow').forEach(r=>r.onclick=()=>addToCart(r.dataset.id));
  m.querySelectorAll('.ci-qty').forEach(i=>i.onchange=e=>updateQty(Number(i.dataset.idx),Number(e.target.value)));
  m.querySelectorAll('.ci-del').forEach(b=>b.onclick=()=>{cart.splice(Number(b.dataset.idx),1);renderPOS(m);});
  updatePosTotals();
}
function prodRow(p){
  const low=p.stock<=(p.low_stock||settings.low_stock_threshold);
  return `<tr class="prow" data-id="${p.id}">
    <td class="small">${esc(p.sku||'-')}</td>
    <td>${esc(p.name)}</td>
    <td>${esc(p.unit)}</td>
    <td class="text-right" style="color:var(--primary);font-weight:700;">฿${money(p.price)}</td>
    <td class="text-right ${low?'low-stock':''}">${p.stock}</td>
    <td class="add-hint text-center">+</td>
  </tr>`;
}
function cartRow(it,idx){
  return `<div class="cart-row">
    <div class="ci-name">${esc(it.product_name)}<small>฿${money(it.price)} / ${esc(it.unit)}</small></div>
    <input class="ci-qty" type="number" min="0.01" step="0.01" value="${it.qty}" data-idx="${idx}">
    <div class="ci-total">฿${money(it.price*it.qty)}</div>
    <button class="ci-del" data-idx="${idx}">✕</button>
  </div>`;
}
function calcTotals(){
  const subtotal=cart.reduce((s,it)=>s+it.price*it.qty,0);
  let discVal=discType==='percent'?subtotal*(discAmt/100):discAmt;
  discVal=Math.max(0,Math.min(discVal,subtotal));
  const total=subtotal-discVal;
  const paid=Number(paidStr)||0;
  return {subtotal,discVal,total,paid};
}
function updatePosTotals(){
  const t=calcTotals();
  const g=id=>document.getElementById(id); if(!g('tSub'))return;
  g('tSub').textContent='฿'+money(t.subtotal);
  g('tDisc').textContent='-฿'+money(t.discVal);
  g('tGrand').textContent='฿'+money(t.total);
  const cust=customers.find(c=>c.id===selCustomer);
  const ci=g('creditInfo');
  const dr=g('debtResult');
  const wn=g('tWarn');
  const cl=g('changeLbl');
  const tc=g('tChange');
  if(payMethod==='cash'){
    ci.innerHTML='';dr.innerHTML='';cl.textContent='เงินทอน';
    const change=t.paid-t.total;
    tc.textContent='฿'+money(Math.max(change,0));
    tc.style.color=change<0?'var(--red)':'var(--green)';
    wn.textContent=change<0?`รับเงินไม่พอ ขาด ฿${money(-change)}`:'';
  }else{
    // Credit mode
    if(cust&&cust.name!=='ลูกค้าทั่วไป'){
      const remain=(cust.credit_limit||0)-(cust.debt||0);
      ci.innerHTML=`<div class="credit-info">วงเงิน ฿${money(cust.credit_limit)} • หนี้เดิม ฿${money(cust.debt||0)} • คงเหลือ ฿${money(remain)}</div>`;
    }else{
      ci.innerHTML=`<div class="credit-info" style="background:#fee2e2;border-color:#fecaca;color:#991b1b;">⚠ บันทึกหนี้ต้องเลือกลูกค้าที่มีชื่อ</div>`;
    }
    // Debt logic display
    if(t.paid>=t.total){
      const credit=t.paid-t.total;
      if(credit>0){
        cl.textContent='ส่วนเกิน (ชำระหนี้เก่า)';
        tc.textContent='฿'+money(credit);
        tc.style.color='var(--primary)';
        dr.innerHTML=`<div class="debt-result credit">💳 จ่ายเกิน ฿${money(credit)} → นำไปชำระหนี้บิลเก่าที่สุดก่อน</div>`;
      }else{
        cl.textContent='ยอดคงเหลือ';
        tc.textContent='฿0.00'; tc.style.color='var(--green)';
        dr.innerHTML=`<div class="debt-result clear">✅ ชำระครบยอด ไม่มีหนี้ค้าง</div>`;
      }
      wn.textContent='';
    }else{
      const debtAdd=t.total-t.paid;
      cl.textContent='ยอดค้างชำระ';
      tc.textContent='฿'+money(debtAdd);
      tc.style.color='var(--red)';
      dr.innerHTML=`<div class="debt-result add">⚠ ค้างชำระ ฿${money(debtAdd)} → บันทึกเป็นหนี้บิลนี้</div>`;
      if(cust&&cust.credit_limit>0){
        const after=(cust.debt||0)+debtAdd;
        wn.textContent=after>cust.credit_limit?`เกินวงเงินเครดิต ฿${money(after-cust.credit_limit)}`:'';
      }else wn.textContent='';
    }
  }
}
function updateProdTable(){
  const prods=filteredProds();
  const tbody=document.querySelector('.prod-table-wrap tbody');
  if(!tbody)return;
  tbody.innerHTML=prods.length
    ?prods.map(prodRow).join('')
    :`<tr><td colspan="6" class="empty-state">ไม่พบสินค้า</td></tr>`;
  tbody.querySelectorAll('tr.prow').forEach(r=>r.onclick=()=>addToCart(r.dataset.id));
}
function addToCart(id){
  const p=products.find(x=>x.id===id); if(!p)return;
  const ex=cart.find(x=>x.product_id===id);
  if(ex) ex.qty=Math.round((ex.qty+1)*1000)/1000;
  else cart.push({product_id:p.id,product_name:p.name,unit:p.unit,price:p.price,qty:1,cost:p.cost||0});
  renderPOS(document.getElementById('mainArea'));
}
function updateQty(idx,qty){if(qty<=0)cart.splice(idx,1);else cart[idx].qty=qty;renderPOS(document.getElementById('mainArea'));}

async function confirmSale(){
  if(!cart.length)return;
  const t=calcTotals();
  const cust=customers.find(c=>c.id===selCustomer);
  let debtToAdd=0, creditToApply=0;
  if(payMethod==='credit'){
    if(!cust||cust.name==='ลูกค้าทั่วไป'){alert('บันทึกหนี้ต้องเลือกลูกค้าที่มีชื่อก่อน');return;}
    if(t.paid>=t.total){
      debtToAdd=0; creditToApply=t.paid-t.total;
    }else{
      debtToAdd=t.total-t.paid; creditToApply=0;
    }
    if(cust.credit_limit>0){
      const after=(cust.debt||0)+debtToAdd;
      if(after>cust.credit_limit&&!confirm(`ยอดหนี้จะเกินวงเงิน ฿${money(after-cust.credit_limit)}\nดำเนินการต่อ?`))return;
    }
  }else{
    if(t.paid<t.total&&!confirm('รับเงินไม่พอ ดำเนินการต่อ?'))return;
  }
  for(const it of cart){
    const p=products.find(x=>x.id===it.product_id);
    if(p&&it.qty>p.stock&&!confirm(`"${p.name}" สต็อก ${p.stock} ${p.unit} แต่ขาย ${it.qty}\nดำเนินการต่อ?`))return;
  }
  showSpinner();
  try{
    const {data:sale,error:sErr}=await sb.from('sales').insert({
      sale_date:new Date().toISOString(),customer_id:selCustomer,
      customer_name:cust?.name||'ลูกค้าทั่วไป',
      payment_method:payMethod,subtotal:t.subtotal,discount:t.discVal,
      total:t.total,paid:t.paid,
      change_amount:payMethod==='cash'?Math.max(t.paid-t.total,0):0,
      debt_amount:debtToAdd,debt_remaining:debtToAdd,
    }).select().single();
    if(sErr)throw sErr;
    const items=cart.map(it=>({sale_id:sale.id,product_id:it.product_id,
      product_name:it.product_name,unit:it.unit,price:it.price,qty:it.qty,cost:it.cost||0}));
    const {error:iErr}=await sb.from('sale_items').insert(items);if(iErr)throw iErr;
    for(const it of cart){
      await sb.rpc('deduct_stock',{p_id:it.product_id,p_qty:it.qty});
      const p=products.find(x=>x.id===it.product_id);if(p)p.stock=Math.round((p.stock-it.qty)*10000)/10000;
    }
    if(payMethod==='credit'){
      if(debtToAdd>0){
        await sb.rpc('add_debt',{c_id:selCustomer,amt:debtToAdd});
        if(cust)cust.debt=(cust.debt||0)+debtToAdd;
      }
      if(creditToApply>0){
        const {data:res}=await sb.rpc('pay_customer_debt',{c_id:selCustomer,pay_amount:creditToApply});
        if(cust&&res)cust.debt=Math.max(0,(cust.debt||0)-res.reduced);
        await loadAll(); // reload to get updated debt_remaining on old sales
      }
    }
    sale.items=items; sales.unshift({...sale,items});

    // ── สร้างใบเสร็จรับเงินอัตโนมัติใน documents ──
    try{
      const{data:rcpNum}=await sb.rpc('get_next_doc_number',{p_type:'r'});
      if(rcpNum){
        const rcpPayload={
          doc_type:'r', doc_number:rcpNum,
          buyer_name:cust?.name||'ลูกค้าทั่วไป',
          doc_date:new Date().toISOString().slice(0,10),
          grand_total:t.total,
          ref_number:'POS#'+now8(sale.id),
          data:{
            buyerName:cust?.name||'ลูกค้าทั่วไป',
            buyerAddr:cust?.address||'',
            buyerContact:cust?.phone||'',
            buyerBranch:'',buyerTaxId:'',
            docDate:new Date().toISOString().slice(0,10),
            docRef:'บิล POS #'+now8(sale.id),
            docValid:'',
            rcpMethod:payMethod==='cash'?'เงินสด':'เครดิต/ลงบิล',
            rcpRef:'',discType:'amount',
            discValue:String(t.discVal),
            vatRate:String(vatRate),vatMode,copyTag:'ต้นฉบับ',
            docNote:payMethod==='credit'&&debtToAdd>0?`ค้างชำระ ฿${money(debtToAdd)}`:'',
            items:cart.map(it=>({qty:String(it.qty),unit:it.unit,detail:it.product_name,price:String(it.price)})),
          }
        };
        const{data:_rcpDoc}=await sb.from('documents').insert(rcpPayload).select('id').single();
        if(_rcpDoc)sale.receipt_doc_id=_rcpDoc.id;
      }
    }catch(re){console.warn('Auto-receipt:',re.message);}

    const saleVatInfo={vat:t.vat,vatMode,vatRate};
    cart=[];discAmt=0;paidStr='';payMethod='cash';vatMode='none';
    hideSpinner();render();showReceipt(sale,items);
  }catch(e){hideSpinner();showToast('ผิดพลาด: '+e.message,'error');}
}

function showReceipt(sale,items,_vatInfo){
  const bg=el(`<div class="modal-bg"><div class="modal" style="max-width:400px;padding:28px;text-align:center;">
    <div style="font-size:44px;margin-bottom:10px;">✅</div>
    <h3 style="margin:0 0 6px;color:var(--green);font-size:18px;">บันทึกการขายสำเร็จ</h3>
    <p style="color:var(--muted);font-size:13px;margin:0 0 18px;">ใบเสร็จถูกสร้างและบันทึกในระบบแล้ว</p>
    <div style="background:var(--bg);border-radius:10px;padding:14px;margin-bottom:18px;text-align:left;font-size:13.5px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span style="color:var(--muted)">ลูกค้า</span>
        <span style="font-weight:700;">${esc(sale.customer_name)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span style="color:var(--muted)">ยอดสุทธิ</span>
        <span style="font-weight:800;color:var(--primary-dark);font-size:16px;">฿${money(sale.total)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;">
        <span style="color:var(--muted)">${sale.payment_method==='cash'?'เงินทอน':'ค้างชำระ'}</span>
        <span style="font-weight:700;color:${sale.payment_method==='cash'?'var(--green)':'var(--red)'};">
          ฿${money(sale.payment_method==='cash'?(sale.change_amount||0):(sale.debt_amount||0))}
        </span>
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn gray" id="closeR" style="flex:1;">ปิด</button>
      <button class="btn" id="openRcp" style="flex:2;">🖨️ พิมพ์ใบเสร็จ</button>
    </div>
  </div></div>`);
  document.body.appendChild(bg);
  bg.querySelector('#closeR').onclick=()=>bg.remove();
  bg.querySelector('#openRcp').onclick=()=>{
    const url=sale.receipt_doc_id
      ?`documents.html?id=${sale.receipt_doc_id}&print=1&minimal=1`
      :'documents.html?print=1&minimal=1';
    window.open(url,'_blank','width=820,height=1100,menubar=no,toolbar=no,location=no,status=no,scrollbars=yes');
    bg.remove();
  };
}

const ALL_UNITS=['เมตร','เส้น','ชิ้น','ตร.ม.','แผ่น','ชุด','บาน','คู่','กล่อง','ม้วน','อัน','ตัว','ท่อน'];
function updateProductsTable(m){
  const prods=filteredProds();
  const tbody=document.querySelector('#mainArea table tbody');
  if(!tbody)return;
  tbody.innerHTML=prods.length?prods.map(p=>{
    const ci=catInfo(p.category);const low=p.stock<=(p.low_stock||settings.low_stock_threshold);
    return `<tr>
      <td class="small">${esc(p.sku||'-')}</td><td>${esc(p.name)}</td>
      <td><span class="badge ${ci.color}">${esc(ci.label)}</span></td>
      <td class="text-right">฿${money(p.price)}</td><td class="text-right small">฿${money(p.cost||0)}</td>
      <td>${esc(p.unit)}</td><td class="text-right ${low?'low-stock':''}">${p.stock}</td>
      <td class="text-center small">${p.low_stock||settings.low_stock_threshold}</td>
      <td style="white-space:nowrap;"><button class="btn amber sm" data-edit="${p.id}">แก้ไข</button> <button class="btn red sm" data-del="${p.id}">ลบ</button></td>
    </tr>`;}).join('')
    :`<tr><td colspan="9" class="empty-state">ไม่มีสินค้า</td></tr>`;
  tbody.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openProductModal(b.dataset.edit,m));

function renderSalesRows(list){
  if(!list.length)return `<tr><td colspan="8" class="empty-state">ไม่มีประวัติการขาย</td></tr>`;
  return list.map(s=>`<tr>
    <td class="small">${now8(s.id)}</td><td>${dateLabel(s.sale_date||s.created_at)}</td><td>${esc(s.customer_name)}</td>
    <td class="small">${s.payment_method==='credit'?'📒 เครดิต':'💵 เงินสด'}</td>
    <td class="text-center">${(s.items||s.sale_items||[]).length}</td>
    <td class="text-right" style="font-weight:700;">฿${money(s.total)}</td>

function bindSaleEvents(m){
  document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{const s=sales.find(x=>x.id===b.dataset.view);if(s)showReceipt(s,s.items||s.sale_items||[]);});
  document.querySelectorAll('[data-void]').forEach(b=>b.onclick=()=>voidSale(b.dataset.void,m));
}
async function voidSale(id,m){
  if(!confirm('ยกเลิกบิลนี้ คืนสต็อก และหักยอดหนี้ที่ยังค้างอยู่?'))return;
  showSpinner();const s=sales.find(x=>x.id===id);
  try{
    if(s){
      for(const it of(s.items||s.sale_items||[])){await sb.rpc('restore_stock',{p_id:it.product_id,p_qty:it.qty});const p=products.find(x=>x.id===it.product_id);if(p)p.stock+=it.qty;}
      const debtRemaining=s.debt_remaining||0;
      if(s.payment_method==='credit'&&debtRemaining>0&&s.customer_id){
        await sb.rpc('pay_customer_debt',{c_id:s.customer_id,pay_amount:debtRemaining});
        const c=customers.find(x=>x.id===s.customer_id);if(c)c.debt=Math.max(0,(c.debt||0)-debtRemaining);
      }
    }
    const{error}=await sb.from('sales').delete().eq('id',id);if(error)throw error;
    sales=sales.filter(x=>x.id!==id);hideSpinner();renderSales(m);
  }catch(e){hideSpinner();showToast('ยกเลิกไม่สำเร็จ: '+e.message,'error');}
}

function renderReport(m){
  const today=new Date();today.setHours(0,0,0,0);
  const sToday=sales.filter(s=>new Date(s.sale_date||s.created_at)>=today);
  const totDay=sToday.reduce((a,x)=>a+x.total,0);
  const totAll=sales.reduce((a,x)=>a+x.total,0);
  const profit=sales.reduce((sum,s)=>sum+(s.items||s.sale_items||[]).reduce((s2,it)=>s2+(it.price-(it.cost||0))*it.qty,0),0);
  const totalDebt=customers.reduce((a,c)=>a+(c.debt||0),0);
  const lowItems=products.filter(p=>p.stock<=(p.low_stock||settings.low_stock_threshold));
  const qtyMap={};sales.forEach(s=>(s.items||s.sale_items||[]).forEach(it=>{qtyMap[it.product_name]=(qtyMap[it.product_name]||0)+Number(it.qty);}));
  const topProds=Object.entries(qtyMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const monthMap={};sales.forEach(s=>{const d=new Date(s.sale_date||s.created_at);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;monthMap[k]=(monthMap[k]||0)+s.total;});
  const months=Object.entries(monthMap).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);
  m.innerHTML=`
  <div class="stat-cards">
    <div class="stat"><div class="num">฿${money(totDay)}</div><div class="lbl">ยอดขายวันนี้ (${sToday.length} บิล)</div></div>
    <div class="stat"><div class="num">฿${money(totAll)}</div><div class="lbl">ยอดขายสะสม (${sales.length} บิล)</div></div>
    <div class="stat"><div class="num">฿${money(profit)}</div><div class="lbl">กำไรสะสม (ประมาณ)</div></div>
    <div class="stat"><div class="num debt-val">฿${money(totalDebt)}</div><div class="lbl">หนี้ลูกค้าคงค้าง</div></div>
    <div class="stat"><div class="num" style="color:${lowItems.length?'var(--red)':'var(--green)'}">${lowItems.length}</div><div class="lbl">สินค้าใกล้หมด</div></div>
  </div>
  <div class="row">
    <div class="col card"><h3>📊 ยอดขายรายเดือน</h3><table><thead><tr><th>เดือน</th><th class="text-right">ยอดขาย</th></tr></thead><tbody>
    ${months.map(([k,v])=>`<tr><td>${k}</td><td class="text-right">฿${money(v)}</td></tr>`).join('')||`<tr><td colspan="2" class="empty-state">ยังไม่มีข้อมูล</td></tr>`}
    </tbody></table></div>
    <div class="col card"><h3>🏆 สินค้าขายดี</h3><table><thead><tr><th>สินค้า</th><th class="text-right">จำนวนรวม</th></tr></thead><tbody>
    ${topProds.map(([n,q])=>`<tr><td>${esc(n)}</td><td class="text-right">${q}</td></tr>`).join('')||`<tr><td colspan="2" class="empty-state">ยังไม่มีข้อมูล</td></tr>`}
    </tbody></table></div>
  </div>
  <div class="card"><h3>⚠ สินค้าใกล้หมด</h3><table><thead><tr><th>SKU</th><th>สินค้า</th><th class="text-right">คงเหลือ</th><th>หน่วย</th><th class="text-right">เกณฑ์</th></tr></thead><tbody>

function renderSettings(m){

    {id:'shop',label:'🏪 ข้อมูลร้าน'},
    {id:'cats',label:'🏷️ หมวดหมู่'},

  ];
  m.innerHTML=`
  <div class="tab-pills">${pills.map(p=>`<button class="tab-pill ${settingsSub===p.id?'active':''}" data-sub="${p.id}">${p.label}</button>`).join('')}</div>

  m.querySelectorAll('.tab-pill').forEach(b=>b.onclick=()=>{settingsSub=b.dataset.sub;renderSettings(m);});

function renderSettingsCats(div,m){
  div.innerHTML=`<div class="card" style="max-width:580px;">

    <div class="row" style="margin-bottom:10px;align-items:flex-end;">

    ${categories.map(c=>{const cnt=products.filter(p=>p.category===c.id).length;return `<tr>
      <td><span class="badge ${c.color}">${esc(c.label)}</span></td>
      <td><input class="cat-name-inp" data-cid="${c.id}" value="${esc(c.label)}" style="width:100%;max-width:200px;padding:4px 7px;font-size:13px;"></td>

      </td>
    </tr>`;}).join('')}
    </tbody></table>
    <div class="small" style="margin-top:8px;">* ลบได้เฉพาะหมวดที่ไม่มีสินค้า</div>
  </div>`;
  document.getElementById('addCatBtn').onclick=async()=>{
    const label=document.getElementById('newCatName').value.trim();if(!label){alert('กรุณาใส่ชื่อ');return;}
    const color=document.getElementById('newCatColor').value;
    const id='cat_'+Date.now().toString(36);
    const maxOrder=Math.max(0,...categories.map(c=>c.sort_order||0));
    showSpinner();const{data:nc,error}=await sb.from('categories').insert({id,label,color,sort_order:maxOrder+1}).select().single();hideSpinner();
    if(error){showToast('เพิ่มไม่สำเร็จ: '+error.message,'error');return;}
    categories.push(nc);categories.sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));renderSettingsCats(div,m);
  };
  div.querySelectorAll('.cat-save-btn').forEach(b=>b.onclick=async()=>{
    const cid=b.dataset.cid;
    const inp=div.querySelector(`.cat-name-inp[data-cid="${cid}"]`);
    const newLabel=inp?.value.trim();if(!newLabel){alert('ชื่อหมวดหมู่ต้องไม่ว่าง');return;}
    const cat=categories.find(c=>c.id===cid);if(!cat)return;
    // ตรวจสอบชื่อซ้ำกับหมวดหมู่อื่น
    const conflict=categories.find(c=>c.id!==cid&&c.label.trim()===newLabel);
    if(conflict){
      const pCount=products.filter(p=>p.category===cid).length;
      const tCount=products.filter(p=>p.category===conflict.id).length;
      if(!confirm(
        `ชื่อ "${newLabel}" ซ้ำกับหมวด "${conflict.label}" (${conflict.id})\n\n` +
        `• หมวดนี้ (${cid}) มีสินค้า ${pCount} รายการ\n` +
        `• หมวดปลายทาง (${conflict.id}) มีสินค้า ${tCount} รายการ\n\n` +
        `ต้องการรวมหมวดหมู่ทั้งสองเข้าด้วยกัน?\n` +
        `(สินค้าทั้ง ${pCount} รายการจะย้ายไปอยู่ใน "${conflict.label}")`
      ))return;

      const{data:res,error}=await sb.rpc('merge_categories',{source_id:cid,target_id:conflict.id});
      hideSpinner();
      if(error){showToast('รวมหมวดหมู่ไม่สำเร็จ: '+error.message,'error');return;}
      showToast(`รวมหมวดหมู่แล้ว ย้ายสินค้า ${res?.moved||0} รายการ`);
      await loadAll();renderSettingsCats(div,m);return;
    }
    showSpinner();const{error}=await sb.from('categories').update({label:newLabel}).eq('id',cid);hideSpinner();
    if(error){showToast('บันทึกไม่สำเร็จ: '+error.message,'error');return;}
    cat.label=newLabel;showToast('บันทึกชื่อหมวดหมู่แล้ว');renderSettingsCats(div,m);
  });
  div.querySelectorAll('[data-catdel]').forEach(b=>b.onclick=async()=>{
    const id=b.dataset.catdel;const cnt=products.filter(p=>p.category===id).length;
    if(cnt>0){alert('หมวดหมู่นี้มีสินค้าอยู่ '+cnt+' รายการ ไม่สามารถลบได้');return;}
    if(!confirm('ยืนยันลบหมวดหมู่?'))return;
    showSpinner();const{error}=await sb.from('categories').delete().eq('id',id);hideSpinner();
    if(error){showToast('ลบไม่สำเร็จ: '+error.message,'error');return;}
    categories=categories.filter(c=>c.id!==id);renderSettingsCats(div,m);
  });
}

function openUserModal(u,div,m){
  const isNew=!u;
  const bg=el(`<div class="modal-bg"><div class="modal">
    <h3>${isNew?'เพิ่มผู้ใช้ใหม่':'แก้ไขผู้ใช้'}</h3>

    ${!isNew?`<div class="field"><label>สถานะ</label>
      <select id="uactive"><option value="1" ${u?.is_active?'selected':''}>ใช้งาน</option><option value="0" ${!u?.is_active?'selected':''}>ปิดใช้</option></select></div>`:''}
    <div class="flex-end"><button class="btn gray" id="cancelU">ยกเลิก</button><button class="btn green" id="saveU">💾 บันทึก</button></div>
  </div></div>`);
  document.body.appendChild(bg);
  bg.querySelector('#cancelU').onclick=()=>bg.remove();
  bg.querySelector('#saveU').onclick=async()=>{
    const uname=document.getElementById('uname').value.trim();
    const pass=document.getElementById('upass').value;
    const dname=document.getElementById('udname').value.trim();
    const role=document.getElementById('urole').value;
    if(isNew&&(!uname||!pass)){alert('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน');return;}
    if(isNew&&!uname){alert('กรุณากรอกชื่อผู้ใช้');return;}
    showSpinner();
    try{
      const data={display_name:dname,role};
      if(!isNew) data.is_active=document.getElementById('uactive').value==='1';
      if(pass) data.password_hash=await sha256(pass);
      if(isNew){data.username=uname;const{error}=await sb.from('pos_users').insert(data).select().single();if(error)throw error;}
      else{const{error}=await sb.from('pos_users').update(data).eq('id',u.id);if(error)throw error;}
      // Update own session display_name if editing self
      if(!isNew&&u.id===session?.userId&&data.display_name){
        session.display_name=data.display_name;
        const s=JSON.parse(localStorage.getItem(SESSION_KEY)||'{}');
        s.display_name=data.display_name;localStorage.setItem(SESSION_KEY,JSON.stringify(s));
      }
      bg.remove();hideSpinner();loadUsers(div,m);showToast(isNew?'เพิ่มผู้ใช้แล้ว':'บันทึกแล้ว');
    }catch(e){hideSpinner();showToast('ผิดพลาด: '+e.message,'error');}
  };
}

let importData=[];
let importColMap={name:null,unit:null,price:null,cost:null,stock:null,sku:null,category:null};

async function handleImportFile(e,div){
  const file=e.target.files[0];if(!file)return;
  // Load SheetJS
  if(!window.XLSX){
    showSpinner();
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload=res;s.onerror=rej;document.head.appendChild(s);
    });
    hideSpinner();
  }
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(!rows.length){showToast('ไฟล์ว่างเปล่า','error');return;}
  const headers=rows[0].map(h=>String(h||'').trim());
  importData=rows.slice(1).filter(r=>r.some(c=>String(c||'').trim()));
  // Auto-detect columns
  const autoMap={
    name: findCol(headers,['ชื่อสินค้า','product','name','สินค้า','รายการ']),
    unit: findCol(headers,['หน่วยนับ','หน่วย','unit']),
    price: findCol(headers,['ราคาขายปลีก','ราคาขาย','price','price_sell','ราคา']),
    cost: findCol(headers,['ราคาทุน','ต้นทุน','cost','price_cost']),
    stock: findCol(headers,['สต๊อก','สต๊อกปัจจุบัน','stock','total_now','คงเหลือ']),
    sku: findCol(headers,['รหัสสินค้า','sku','code','SKU (รหัสสินค้า)']),
    category: findCol(headers,['หมวดหมู่','category','กลุ่ม','รหัสหมวดหมู่']),
  };
  importColMap={...autoMap};
  // Render column mapping
  const fields=[
    {k:'name',l:'ชื่อสินค้า *'},{k:'unit',l:'หน่วยนับ'},{k:'price',l:'ราคาขาย'},
    {k:'cost',l:'ราคาทุน'},{k:'stock',l:'สต๊อก'},{k:'sku',l:'รหัสสินค้า (SKU)'},{k:'category',l:'หมวดหมู่'},
  ];
  const mapEl=document.getElementById('importColMap');
  mapEl.style.display='block';
  document.getElementById('colMapGrid').innerHTML=`<div class="row" style="gap:8px;flex-wrap:wrap;">
    ${fields.map(f=>`<div style="flex:1;min-width:140px;" class="field">
      <label style="font-size:11px;">${f.l}</label>
      <select class="col-map-sel" data-field="${f.k}">
        <option value="">-- ไม่ใช้ --</option>
        ${headers.map((h,i)=>`<option value="${i}" ${autoMap[f.k]===i?'selected':''}>${esc(h)}</option>`).join('')}
      </select>
    </div>`).join('')}
  </div>`;
  div.querySelectorAll('.col-map-sel').forEach(sel=>sel.onchange=e=>{
    importColMap[sel.dataset.field]=e.target.value===''?null:Number(e.target.value);
    updateImportPreview(div,headers);
  });
  updateImportPreview(div,headers);
}
function findCol(headers,names){
  for(const n of names){const i=headers.findIndex(h=>String(h||'').toLowerCase()===n.toLowerCase());if(i>=0)return i;}
  for(const n of names){const i=headers.findIndex(h=>String(h||'').toLowerCase().includes(n.toLowerCase()));if(i>=0)return i;}
  return null;
}
function updateImportPreview(div,headers){
  const preEl=document.getElementById('importPreview');
  const actEl=document.getElementById('importActions');
  const cntEl=document.getElementById('importCount');
  const valid=importData.filter(r=>importColMap.name!==null&&String(r[importColMap.name]||'').trim());
  if(cntEl)cntEl.textContent=`พบสินค้า ${valid.length} รายการ`;
  if(actEl)actEl.style.display=valid.length?'block':'none';
  const preview=valid.slice(0,5);
  if(!preview.length){preEl.innerHTML='';return;}
  const cols=[['name','ชื่อสินค้า'],['unit','หน่วย'],['price','ราคาขาย'],['cost','ราคาทุน'],['stock','สต๊อก'],['sku','SKU'],['category','หมวดหมู่']];
  preEl.innerHTML=`<div class="import-preview">
    <table><thead><tr>${cols.map(([,l])=>`<th>${l}</th>`).join('')}</tr></thead><tbody>
    ${preview.map(r=>`<tr>${cols.map(([k])=>{
      const idx=importColMap[k];
      return `<td>${esc(idx!==null?String(r[idx]||'').trim():'')}</td>`;
    }).join('')}</tr>`).join('')}
    </tbody></table>
  </div><div class="small" style="margin-top:6px;">แสดง 5 แถวแรก จากทั้งหมด ${valid.length} รายการ</div>`;
  if(document.getElementById('doImportBtn'))
    document.getElementById('doImportBtn').onclick=()=>doImport(div);
}
async function doImport(div){
  const catOverride=document.getElementById('importCatOverride')?.value||'';
  const nameIdx=importColMap.name;
  if(nameIdx===null){alert('กรุณาเลือกคอลัมน์ชื่อสินค้า');return;}
  const rows=importData.filter(r=>String(r[nameIdx]||'').trim());
  if(!rows.length){alert('ไม่มีข้อมูลสินค้า');return;}
  if(!confirm(`จะนำเข้าสินค้าทั้งหมด ${rows.length} รายการ\n(รายการที่มี SKU ซ้ำจะถูก upsert) ยืนยัน?`))return;
  showSpinner();
  let imported=0,skipped=0;
  const BATCH=50;
  try{
    for(let i=0;i<rows.length;i+=BATCH){
      const batch=rows.slice(i,i+BATCH);
      const insertArr=batch.map(r=>{
        const name=String(r[nameIdx]||'').trim();
        if(!name)return null;
        const getV=(k,def='')=>{const idx=importColMap[k];return idx!==null?String(r[idx]||'').trim():def;};
        const toNum=(k,def=0)=>{const v=parseFloat(getV(k,'0').replace(/,/g,''));return isNaN(v)?def:v;};
        let catId='other';
        if(catOverride) catId=catOverride;
        else if(importColMap.category!==null){
          const cv=getV('category');
          const found=categories.find(c=>c.id===cv||c.label===cv);
          if(found)catId=found.id;
        }
        const obj={name,category:catId,unit:getV('unit','ชิ้น')||'ชิ้น',price:toNum('price'),cost:toNum('cost'),stock:toNum('stock'),low_stock:10};
        const sku=getV('sku');if(sku)obj.sku=sku;
        return obj;
      }).filter(Boolean);
      const{data:res,error}=await sb.from('products').upsert(insertArr,{onConflict:'sku',ignoreDuplicates:false}).select();
      if(error)throw error;
      imported+=res?.length||insertArr.length;
    }
    await loadAll();
    hideSpinner();
    showToast(`นำเข้าสำเร็จ ${imported} รายการ`);
    renderProducts(document.getElementById('mainArea'));
    currentTab='products';render();
  }catch(e){hideSpinner();showToast('นำเข้าไม่สำเร็จ: '+e.message,'error');}
}
